server {
    server_name projects.asi360.co;

    root /var/www/project-dashboard;
    index index.html;

    # Main directory requires auth
    auth_basic "ASI 360 Projects — Authorized Access Only";
    auth_basic_user_file /etc/nginx/.htpasswd-projects;

    # SPA fallback — all routes handled by React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types application/javascript text/css application/json;
    gzip_min_length 1000;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/projects.asi360.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/projects.asi360.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = projects.asi360.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name projects.asi360.co;
    return 404; # managed by Certbot
}
