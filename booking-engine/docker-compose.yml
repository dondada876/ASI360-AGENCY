# 500GL Booking Engine — Docker Compose
# Usage: docker compose up -d
# Rebuild: docker compose up -d --build

services:
  booking:
    build: .
    container_name: 500gl-booking
    ports:
      - "3206:3206"
    environment:
      - NODE_ENV=production
      - PORT=3206
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3206/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
