services:
  # 3 categories × 2 sub-items each = maps to template's service grid structure
  - name: "Access Control"
    description: "Enterprise-grade access control solutions including card readers, biometric systems, and cloud-managed credentials for commercial and government facilities."
    icon: shield
    sub_items:
      - "Card Reader Installation"
      - "Biometric Access Systems"

  - name: "Video Surveillance"
    description: "High-definition IP camera systems with AI-powered analytics, remote monitoring, and 24/7 recording for complete situational awareness."
    icon: camera
    sub_items:
      - "IP Camera Systems"
      - "AI Video Analytics"

  - name: "Alarm & Detection"
    description: "Commercial alarm systems with real-time monitoring, automated dispatch, and integration with existing security infrastructure."
    icon: bell
    sub_items:
      - "Intrusion Detection"
      - "Fire & Life Safety"

  - name: "Structured Cabling"
    description: "Professional low-voltage cabling infrastructure for data, voice, and security systems — Cat6A, fiber optic, and pathway design."
    icon: cable

  - name: "System Integration"
    description: "Unified security platform integration connecting access control, video, alarms, and building management into a single pane of glass."
    icon: layers

  - name: "Emergency Response"
    description: "Rapid-response security system repair and emergency restoration services with guaranteed response times for critical infrastructure."
    icon: alert

