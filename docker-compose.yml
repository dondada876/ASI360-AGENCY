version: '3.8'

# ASI 360 - Allied Systems Integrations
# Multi-client WordPress hosting with Astra Pro automation
# Each client gets isolated WordPress + MySQL containers

services:
  # Reverse proxy for routing domains to correct containers
  traefik:
    image: traefik:v2.10
    container_name: asi360_traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@asi360.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - asi360_network

  # Client 1: Example Client (ASE-F.org already live, this is template)
  client1_wordpress:
    image: wordpress:latest
    container_name: asi360_client1_wp
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: client1_mysql
      WORDPRESS_DB_NAME: client1_db
      WORDPRESS_DB_USER: client1_user
      WORDPRESS_DB_PASSWORD: ${CLIENT1_DB_PASSWORD}
    volumes:
      - client1_wp_data:/var/www/html
      - ./astra-pro-plugins:/var/www/html/wp-content/plugins/astra-addons:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client1.rule=Host(`client1.asi360.com`)"
      - "traefik.http.routers.client1.entrypoints=websecure"
      - "traefik.http.routers.client1.tls.certresolver=letsencrypt"
    depends_on:
      - client1_mysql
    networks:
      - asi360_network

  client1_mysql:
    image: mysql:8.0
    container_name: asi360_client1_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: client1_db
      MYSQL_USER: client1_user
      MYSQL_PASSWORD: ${CLIENT1_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${CLIENT1_ROOT_PASSWORD}
    volumes:
      - client1_mysql_data:/var/lib/mysql
    networks:
      - asi360_network

  # Client 2: Hurricane Relief (JCCIX)
  jccix_wordpress:
    image: wordpress:latest
    container_name: asi360_jccix_wp
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: jccix_mysql
      WORDPRESS_DB_NAME: jccix_db
      WORDPRESS_DB_USER: jccix_user
      WORDPRESS_DB_PASSWORD: ${JCCIX_DB_PASSWORD}
    volumes:
      - jccix_wp_data:/var/www/html
      - ./astra-pro-plugins:/var/www/html/wp-content/plugins/astra-addons:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jccix.rule=Host(`jccix.org`) || Host(`www.jccix.org`)"
      - "traefik.http.routers.jccix.entrypoints=websecure"
      - "traefik.http.routers.jccix.tls.certresolver=letsencrypt"
    depends_on:
      - jccix_mysql
    networks:
      - asi360_network

  jccix_mysql:
    image: mysql:8.0
    container_name: asi360_jccix_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jccix_db
      MYSQL_USER: jccix_user
      MYSQL_PASSWORD: ${JCCIX_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${JCCIX_ROOT_PASSWORD}
    volumes:
      - jccix_mysql_data:/var/lib/mysql
    networks:
      - asi360_network

  # Agency Portal - Client management dashboard
  agency_portal:
    build: ./agency-portal
    container_name: asi360_portal
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./client-configs:/app/client-configs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`portal.asi360.com`)"
      - "traefik.http.routers.portal.entrypoints=websecure"
      - "traefik.http.routers.portal.tls.certresolver=letsencrypt"
    networks:
      - asi360_network

  # Automation Engine - Handles Supabase → WordPress sync
  automation_engine:
    build: ./automation-engine
    container_name: asi360_automation
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./automation-scripts:/app/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - asi360_network

  # Backup service - Daily automated backups
  backup_service:
    image: offen/docker-volume-backup:latest
    container_name: asi360_backup
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"  # 2 AM daily
      BACKUP_RETENTION_DAYS: "30"
      AWS_S3_BUCKET_NAME: ${BACKUP_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY}
    volumes:
      - client1_wp_data:/backup/client1_wp:ro
      - client1_mysql_data:/backup/client1_mysql:ro
      - jccix_wp_data:/backup/jccix_wp:ro
      - jccix_mysql_data:/backup/jccix_mysql:ro
      - ./backups:/archive
    networks:
      - asi360_network

  # Monitoring - Uptime tracking
  uptime_kuma:
    image: louislam/uptime-kuma:latest
    container_name: asi360_monitoring
    restart: unless-stopped
    volumes:
      - uptime_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monitoring.rule=Host(`monitor.asi360.com`)"
      - "traefik.http.routers.monitoring.entrypoints=websecure"
      - "traefik.http.routers.monitoring.tls.certresolver=letsencrypt"
    networks:
      - asi360_network

volumes:
  client1_wp_data:
  client1_mysql_data:
  jccix_wp_data:
  jccix_mysql_data:
  uptime_data:

networks:
  asi360_network:
    driver: bridge
